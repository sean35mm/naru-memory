name: CI

# PR gate. Pushes to `main` are gated by release.yml (which also publishes), so
# CI runs on pull requests (and any non-main branch push) to avoid double runs.
on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack smoke (publish artifact runs on plain Node)
        run: bash scripts/pack-smoke.sh
